<!DOCTYPE html>
<html lang="en">
<head>
<title>Student Login</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
    }

    .login-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 320px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: #555;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #0056b3;
    }

    .toggle-password {
        margin-top: 5px;
        font-size: 12px;
        cursor: pointer;
        color: #007bff;
        text-decoration: underline;
        display: inline-block;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>Student Login</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" placeholder="Enter Student ID" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>
            <span class="toggle-password" onclick="togglePassword()">Show/Hide Password</span>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault(); // prevent actual form submission

    const studentId = document.getElementById("studentId").value;
    const password = document.getElementById("password").value;

    // Simple validation: Student ID must be numeric
    if (!/^\d+$/.test(studentId)) {
        alert("Student ID must be numeric!");
        return;
    }

    if (password.length < 4) {
        alert("Password must be at least 4 characters!");
        return;
    }

    
    alert(`Login successful!\nStudent ID: ${studentId}`);
});
</script>

</body>
</html>
